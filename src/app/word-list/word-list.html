<div class="word-container">

  @for (word of words$ | async; track word.id) {

    <div class="word-card" [class.revealed]="isRevealed(word)" (click)="toggleReveal(word)">

      <div class="word-header">
        <span class="word-title">{{ word.word }} ({{word.difficulty}})</span>
        <div class="score-dot" [ngStyle]="{'background-color': getScoreColor(word)}"></div>
      </div>

      @if (isRevealed(word)) {
        <div class="word-body">

          <p class="definition">
            <strong>Definition:</strong> {{ word.definition }}
          </p>

          @if (word.example_sentence) {
            <p class="example">
              <strong>Example:</strong> {{ word.example_sentence }}
            </p>
          }

          <p class="example">
            <strong>Score:</strong> {{ word.score }}
          </p>

        </div>
      }

    </div>

  }

</div>

<div class="pagination" *ngIf="totalPages$ | async as totalPages">

  <button (click)="prevPage()">⬅ Previous</button>

  <span>Page {{ page$ | async }} / {{ totalPages }}</span>

  <button (click)="nextPage(totalPages)">Next ➡</button>

</div>
